services:
  - type: web
    name: knowledge-mcp
    runtime: node
    region: singapore
    plan: free
    buildCommand: echo "ready"
    startCommand: node dist/bundle.cjs
    envVars:
      - key: KNOWLEDGE_MODE
        value: remote
      - key: NODE_ENV
        value: production
      - key: KNOWLEDGE_SUPABASE_URL
        sync: false
      - key: KNOWLEDGE_SUPABASE_KEY
        sync: false
